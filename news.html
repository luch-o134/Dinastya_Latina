<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticias | Hub Dinastya</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="news.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav>
        <a href="index.html" class="active">INICIO</a>
        <a href="about.html">SOBRE NOSOTROS</a>
        <a href="events.html">CONVOYS Y EVENTOS</a>
        <a href="news.html">NOTICIAS</a>
        <a href="hub.html">NUESTRA GENTE</a>
        <a href="gallery.html">GALERÍA</a>
        <a href="contact.html">¡UNETE!</a>
    </nav>

    <!-- HEADER DE LA SECCIÓN -->
    <header class="header-noticias">
        <h1>Últimas <span>Noticias</span></h1>
        <div class="divisor"></div>
        <p>Mantente al día con las últimas novedades y actualizaciones de nuestra VTC.</p>
    </header>

    <!-- CONTENEDOR DE LAS TARJETAS -->
    <main class="news-grid" id="news-container">
        <!-- Las noticias se inyectarán aquí desde Javascript -->
    </main>

    <!-- VENTANA EMERGENTE (MODAL) OCULTA POR DEFECTO -->
    <div id="modal-noticia" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" onclick="cerrarModal()">&times;</button>
            <img id="modal-img" src="" alt="Imagen Noticia">
            <div class="modal-body">
                <span id="modal-date" class="modal-date"></span>
                <h2 id="modal-title"></h2>
                <p id="modal-desc"></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- SCRIPT DE SUPABASE -->
    <script>
        const supabaseUrl = 'https://njkiskomshvikwvxbpbf.supabase.co';
        const supabaseKey = 'sb_publishable_FRN5siu71w2-l0mCNpcZLA_3-F2Wmls';
        const client = supabase.createClient(supabaseUrl, supabaseKey);

        async function cargarNoticias() {
            const contenedor = document.getElementById('news-container');
            contenedor.innerHTML = '<p style="text-align:center; width:100%; grid-column: 1 / -1;">Cargando novedades...</p>';

            try {
                const { data, error } = await client
                    .from('noticias')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                contenedor.innerHTML = '';

                if (data.length === 0) {
                    contenedor.innerHTML = '<p style="text-align:center; width:100%; grid-column: 1 / -1;">No hay noticias publicadas por ahora.</p>';
                    return;
                }

                data.forEach(noticia => {
                    const fechaNoticia = new Date(noticia.created_at).toLocaleDateString('es-ES');
                    const imagenUrl = (noticia.url_imagen && noticia.url_imagen !== 'null')
                        ? noticia.url_imagen
                        : 'https://images.unsplash.com/photo-1601584115197-04ecc0da31d7?q=80&w=600&auto=format&fit=crop';

                    // Cortar la descripción para la tarjeta (máximo 90 letras)
                    const descCorta = noticia.descripcion.length > 90
                        ? noticia.descripcion.substring(0, 90) + '...'
                        : noticia.descripcion;

                    // Creamos la tarjeta
                    const article = document.createElement('article');
                    article.className = 'news-card';
                    article.innerHTML = `
                        <div class="news-img" style="background-image: url('${imagenUrl}');">
                            <div class="news-date">${fechaNoticia}</div>
                        </div>
                        <div class="news-content">
                            <h2>${noticia.titulo}</h2>
                            <p>${descCorta}</p>
                            <button class="btn-read-more">Más detalles</button>
                        </div>
                    `;

                    // Le damos vida al botón para que abra el modal con los datos de esta noticia
                    const btn = article.querySelector('.btn-read-more');
                    btn.addEventListener('click', () => abrirModal(noticia.titulo, noticia.descripcion, fechaNoticia, imagenUrl));

                    contenedor.appendChild(article);
                });

            } catch (error) {
                console.error('Error al cargar noticias:', error);
                contenedor.innerHTML = '<p style="text-align:center; width:100%; color: #D52B1E; grid-column: 1 / -1;">Hubo un error al cargar las noticias.</p>';
            }
        }

        // --- FUNCIONES DEL MODAL ---
        function abrirModal(titulo, descripcion, fecha, imagen) {
            document.getElementById('modal-title').textContent = titulo;
            document.getElementById('modal-desc').textContent = descripcion;
            document.getElementById('modal-date').textContent = fecha;
            document.getElementById('modal-img').src = imagen;

            const modal = document.getElementById('modal-noticia');
            modal.style.display = 'flex'; // Primero lo hacemos visible
            setTimeout(() => modal.classList.add('active'), 10); // Luego activamos la animación
        }

        function cerrarModal() {
            const modal = document.getElementById('modal-noticia');
            modal.classList.remove('active'); // Quitamos la animación
            setTimeout(() => modal.style.display = 'none', 300); // Lo ocultamos después de que termine
        }

        // Cerrar modal si hacen clic afuera de la caja
        window.onclick = function (event) {
            const modal = document.getElementById('modal-noticia');
            if (event.target == modal) {
                cerrarModal();
            }
        }

        cargarNoticias();
    </script>

</body>

</html>
