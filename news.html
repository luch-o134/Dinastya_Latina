<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticias | 亗DINASTYA LATINA亗</title>
    <link rel="icon" type="image/png" href="imagenes/icono.png">
    <link rel="stylesheet" href="news.css">
</head>

<body>

    <header class="main-header">

        <nav class="main-nav">
            <a href="index.html">INICIO</a>
            <a href="about.html">SOBRE NOSOTROS</a>
            <a href="events.html">CONVOYS Y EVENTOS</a>
            <a href="news.html" class="active">NOTICIAS</a>
            <a href="hub.html">NUESTRA GENTE</a>
            <a href="gallery.html">GALERÍA</a>
            <a href="contact.html" class="btn-nav-unete">¡ÚNETE!</a>
        </nav>
    </header>

    <!-- HEADER DE LA SECCIÓN -->
    <section class="header-noticias">
        <h1>Últimas <span>Noticias</span></h1>
        <div class="divisor"></div>
        <p>Mantente al día con las últimas novedades y actualizaciones de nuestra VTC.</p>
    </section>

    <!-- CONTENEDOR DE LAS TARJETAS -->
    <main class="news-grid" id="news-container">
        <!-- Las noticias se inyectarán aquí desde Javascript -->
    </main>

    <!-- VENTANA EMERGENTE (MODAL) OCULTA POR DEFECTO -->
    <div id="modal-noticia" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" onclick="cerrarModal()">&times;</button>
            <img id="modal-img" src="" alt="Imagen Noticia">
            <div class="modal-body">
                <span id="modal-date" class="modal-date"></span>
                <h2 id="modal-title"></h2>
                <p id="modal-desc"></p>
            </div>
        </div>
    </div>

    <!-- FOOTER IDENTICO AL INICIO -->
    <footer>
        <p>&copy; 2026 亗DINASTYA LATINA亗 VTC. Todos los derechos reservados. No afiliados con SCS Software o TruckersMP.
        </p>
    </footer>

    <!-- Importamos la librería de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // Tus credenciales
        const supabaseUrl = 'https://njkiskomshvikwvxbpbf.supabase.co';
        const supabaseKey = 'sb_publishable_FRN5siu71w2-l0mCNpcZLA_3-F2Wmls';
        const client = supabase.createClient(supabaseUrl, supabaseKey);

        async function cargarNoticias() {
            const contenedor = document.getElementById('news-container');
            contenedor.innerHTML = '<p style="text-align:center; width:100%; grid-column: 1 / -1; color: #e0e0e0;">Cargando novedades...</p>';

            try {
                // AQUÍ ESTABA EL ERROR: Cambiamos 'noticias' por 'news'
                const { data, error } = await client
                    .from('news')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                contenedor.innerHTML = '';

                if (data.length === 0) {
                    contenedor.innerHTML = '<p style="text-align:center; width:100%; grid-column: 1 / -1; color: #e0e0e0;">No hay noticias publicadas por ahora.</p>';
                    return;
                }

                data.forEach(noticia => {
                    // 1. Tomamos la columna created_at y la formateamos a fecha local
                    const opcionesFecha = { year: 'numeric', month: 'long', day: 'numeric' };
                    const fechaNoticia = new Date(noticia.created_at).toLocaleDateString('es-CL', opcionesFecha);

                    let imgLimpia = noticia.imagen_url ? noticia.imagen_url.trim() : '';
                    const imagenUrl = (imgLimpia && imgLimpia !== 'null' && imgLimpia !== 'EMPTY')
                        ? imgLimpia
                        : 'https://images.unsplash.com/photo-1601584115197-04ecc0da31d7?q=80&w=600&auto=format&fit=crop';

                    const descCorta = noticia.contenido && noticia.contenido.length > 90
                        ? noticia.contenido.substring(0, 90) + '...'
                        : noticia.contenido;

                    const article = document.createElement('article');
                    article.className = 'news-card';

                    // 2. Insertamos la fecha justo debajo del título (usando un <span> para el texto)
                    article.innerHTML = `
                        <div class="news-img" style="background-image: url('${imagenUrl}');">
                        </div>
                        <div class="news-content">
                            <h2>${noticia.titulo}</h2>
                            <span style="color: #a0a0a0; font-size: 0.85em; display: block; margin-bottom: 10px; font-weight: bold;">
                                📅 ${fechaNoticia}
                            </span>
                            <p>${descCorta}</p>
                            <button class="btn-read-more">Más detalles</button>
                        </div>
                    `;

                    const btn = article.querySelector('.btn-read-more');
                    btn.addEventListener('click', () => abrirModal(noticia.titulo, noticia.contenido, fechaNoticia, imagenUrl));

                    contenedor.appendChild(article);
                });

            } catch (error) {
                console.error('Error al cargar noticias:', error);
                contenedor.innerHTML = '<p style="text-align:center; width:100%; color: #D52B1E; grid-column: 1 / -1;">Hubo un error al cargar las noticias.</p>';
            }
        }

        function abrirModal(titulo, descripcion, fecha, imagen) {
            document.getElementById('modal-title').textContent = titulo;
            document.getElementById('modal-desc').textContent = descripcion;
            document.getElementById('modal-date').textContent = fecha;
            document.getElementById('modal-img').src = imagen;

            const modal = document.getElementById('modal-noticia');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
        }

        function cerrarModal() {
            const modal = document.getElementById('modal-noticia');
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        window.onclick = function (event) {
            const modal = document.getElementById('modal-noticia');
            if (event.target == modal) {
                cerrarModal();
            }
        }

        // Llamamos a la función al cargar la página
        cargarNoticias();
    </script>

</body>

</html>
